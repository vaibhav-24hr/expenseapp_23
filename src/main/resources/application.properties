#server port (Railway provides PORT env var; falls back to 9999 locally)
server.port=${PORT:9999}

#view -- jsp
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

#DBconnection (credentials come from env vars on Railway, or local-secrets.properties locally)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expenseapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Email (Gmail SMTP) used for Forgot-Password OTP
app.mail.from=${APP_MAIL_FROM:}
app.mail.app-password=${APP_MAIL_APP_PASSWORD:}

#Folder where uploaded bill images and profile pictures are stored
app.upload.dir=${APP_UPLOAD_DIR:src/main/resources/static/assets}

#Load local secrets for development (file is gitignored; safe to skip if missing)
spring.config.import=optional:classpath:local-secrets.properties
